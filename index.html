<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌙 حملة افطار صائم 🌙 </title>
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--pink:#f472b6;--pink2:#fbcfe8;--y2:#fbbf24;--w:#ffffff;--bg:#1a0a14;}
body{background:var(--bg);font-family:'Cairo',sans-serif;overflow-x:hidden;min-height:100vh;cursor:none;}
.cursor{width:11px;height:11px;background:var(--pink);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 10px var(--pink);}

/* stars */
.bg-stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg-star{position:absolute;border-radius:50%;animation:twinkle ease infinite;}
@keyframes twinkle{0%,100%{opacity:.12;}50%{opacity:1;}}

/* hearts */
.hearts{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;}
.heart{position:absolute;bottom:-40px;animation:floatH linear infinite;opacity:0;}
@keyframes floatH{0%{transform:translateY(0);opacity:0;}10%{opacity:.85;}90%{opacity:.7;}100%{transform:translateY(-110vh);opacity:0;}}

/* ═══ SCREEN 1: COUNTDOWN PAGE ═══ */
#s1{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;padding:20px 16px;text-align:center;
  background:radial-gradient(ellipse at 50% 60%,#2a0a1e 0%,#0e0509 100%);
  transition:opacity .8s ease,transform .8s ease;
}
#s1.hide{opacity:0;pointer-events:none;transform:translateY(-50px);}

.lbl{font-size:10px;letter-spacing:5px;color:var(--pink);text-transform:uppercase;animation:fd 1s ease .3s both;}
@keyframes fd{from{opacity:0;transform:translateY(-18px);}to{opacity:1;transform:translateY(0);}}

/* زر يلا نحتفل */
.celebrate-btn {
  padding: 15px 40px;
  background: var(--y2);
  border: none;
  color: #7a3000;
  font-family: 'Cairo', sans-serif;
  font-size: 24px;
  font-weight: 700;
  cursor: pointer;
  border-radius: 50px;
  animation: pulse 1.5s infinite;
  box-shadow: 0 0 30px rgba(251, 191, 36, 0.5);
  margin: 20px 0;
  z-index: 200;
}

.celebrate-btn:hover {
  transform: scale(1.05);
  background: var(--pink);
  color: white;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

/* ═══ SCREEN 2: CAKE PAGE ═══ */
#s2-cake{
  position:fixed;inset:0;z-index:90;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;padding:20px 16px;text-align:center;
  background:radial-gradient(ellipse at 50% 60%,#2a0a1e 0%,#0e0509 100%);
  opacity:0;pointer-events:none;transition:opacity .8s ease;
}
#s2-cake.show{opacity:1;pointer-events:all;}

.wish{font-family:'Scheherazade New',serif;font-size:clamp(30px,6vw,62px);font-weight:700;line-height:1.2;animation:fd 1s ease .6s both;}
.wish .w1{color:var(--w);} .wish .w2{color:var(--y2);text-shadow:0 0 20px rgba(251,191,36,.6);}

/* ═══ CAKE ASSEMBLY ═══ */
.cake-scene{
  display:flex;flex-direction:column;align-items:center;
  animation:fd 1s ease 1.1s both;
  position:relative;
}

/* candles row */
.candles-row{
  display:flex;gap:16px;align-items:flex-end;
  margin-bottom:-1px;position:relative;z-index:5;
}
.candle{display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;user-select:none;}
.candle.blown{opacity:.55;}

.flame-w{width:13px;height:24px;position:relative;animation:fl .2s ease infinite alternate;transform-origin:bottom;}
@keyframes fl{0%{transform:rotate(-3deg) scaleY(1);}100%{transform:rotate(3deg) scaleY(1.1);}}
.fl-core{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:9px;height:19px;background:radial-gradient(ellipse at 50% 80%,#fff9c4,#fbbf24,#f97316);border-radius:50% 50% 30% 30%;filter:blur(1px);}
.fl-halo{position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:13px;height:24px;background:radial-gradient(ellipse at 50% 80%,rgba(255,220,0,.45),rgba(255,100,0,.25),transparent);border-radius:50% 50% 30% 30%;filter:blur(2px);}
.candle.blown .flame-w{visibility:hidden;}
.smoke{display:none;position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:13px;color:#999;animation:smk .9s ease forwards;}
.candle.blown .smoke{display:block;}
@keyframes smk{from{opacity:1;transform:translateX(-50%) translateY(0);}to{opacity:0;transform:translateX(-50%) translateY(-22px);}}
.cb{width:13px;height:46px;border-radius:3px 3px 2px 2px;}
.c1 .cb{background:linear-gradient(#fda4af,#e11d48);}
.c2 .cb{background:linear-gradient(#fde68a,#d97706);}
.c3 .cb{background:linear-gradient(#f9a8d4,#db2777);}
.c4 .cb{background:linear-gradient(#a5f3fc,#0891b2);}
.c5 .cb{background:linear-gradient(#bbf7d0,#16a34a);}
.c6 .cb{background:linear-gradient(#e9d5ff,#9333ea);}

/* ── TOP LAYER ── */
.cake-top{
  width:220px;height:44px;
  background:linear-gradient(180deg,#fce7f3,#f9a8d4);
  border-radius:6px 6px 0 0;
  position:relative;
}
/* frosting drip */
.cake-top::before{
  content:'';position:absolute;top:-13px;left:8px;right:8px;height:16px;
  background:#fff;border-radius:3px;
}
.cake-top::after{
  content:'';position:absolute;top:-9px;left:0;right:0;height:14px;
  background:repeating-linear-gradient(90deg,transparent 0,transparent 11px,#fff 11px,#fff 20px);
  clip-path:ellipse(49% 100% at 50% 0%);
}

/* ── MID LAYER WITH PHOTO ── */
.cake-mid{
  width:244px;height:80px;
  background:linear-gradient(180deg,#fde68a,#f59e0b);
  position:relative;
  display:flex;align-items:center;justify-content:center;
  overflow:visible;
}
.cake-mid::before{
  content:'';position:absolute;top:0;left:0;right:0;height:8px;
  background:#fff;clip-path:ellipse(50% 100% at 50% 0%);
}

/* PHOTO inside mid layer — clipped to layer */
.photo-in-cake{
  width:100px;height:100px;
  border-radius:50%;
  border:3px solid var(--y2);
  box-shadow:0 0 16px rgba(251,191,36,.9),0 0 0 3px rgba(244,114,182,.5);
  overflow:hidden;
  background:#222;
  position:relative;
  z-index:4;
  flex-shrink:0;
}
.photo-in-cake img{
  width:100%;height:100%;
  object-fit:cover;
  object-position:center 10%;
}

/* ── BOT LAYER ── */
.cake-bot{
  width:264px;height:60px;
  background:linear-gradient(180deg,#f472b6,#be185d);
  border-radius:0 0 12px 12px;
  position:relative;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.cake-bot::before{
  content:'';position:absolute;top:0;left:0;right:0;height:8px;
  background:#fff;clip-path:ellipse(50% 100% at 50% 0%);
}
.cake-bot-txt{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:7px;}

.cake-plate{width:298px;height:15px;background:linear-gradient(180deg,#f5f5f5,#ccc);border-radius:50%;margin-top:-3px;box-shadow:0 5px 18px rgba(0,0,0,.5);}
.cake-glow{width:210px;height:22px;background:radial-gradient(ellipse,rgba(244,114,182,.45) 0%,transparent 70%);margin-top:-4px;animation:gp 2s ease infinite;}
@keyframes gp{0%,100%{opacity:.5;}50%{opacity:1;}}

/* counter + buttons */
.cnt-msg{font-size:12px;letter-spacing:2px;color:rgba(244,114,182,.8);min-height:18px;animation:fd 1s ease 1.4s both;}
.blow-btn{padding:10px 30px;background:transparent;border:1.5px solid var(--pink);color:var(--pink);font-family:'Cairo',sans-serif;font-size:12px;letter-spacing:2px;cursor:pointer;border-radius:40px;transition:all .3s;animation:fd 1s ease 1.6s both;}
.blow-btn:hover{background:var(--pink);color:#fff;}
.ltr-btn{padding:10px 30px;background:var(--y2);border:none;color:#7a3000;font-family:'Cairo',sans-serif;font-size:12px;letter-spacing:2px;cursor:pointer;border-radius:40px;font-weight:700;display:none;animation:popIn .5s ease both;}
.ltr-btn:hover{background:var(--pink);color:#fff;}
@keyframes popIn{0%{transform:scale(.3);opacity:0;}70%{transform:scale(1.1);}100%{transform:scale(1);opacity:1;}}

/* ═══ SCREEN 3: ENVELOPE ═══ */
#s3-env{
  position:fixed;inset:0;z-index:80;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:24px;padding:40px 20px;text-align:center;
  background:radial-gradient(ellipse at 50% 60%,#2a0a1e 0%,#0e0509 100%);
  opacity:0;pointer-events:none;transition:opacity .8s ease;
}
#s3-env.show{opacity:1;pointer-events:all;}
.env-ttl{font-family:'Scheherazade New',serif;font-size:clamp(22px,5vw,36px);color:var(--pink2);}

/* envelope */
.env-wrap{
  position:relative;width:310px;height:230px;
  cursor:pointer;
  filter:drop-shadow(0 0 22px rgba(244,114,182,.5));
  transition:transform .3s;
}
.env-wrap:hover{transform:scale(1.03);}
.env-body{position:absolute;bottom:0;left:0;width:310px;height:185px;background:linear-gradient(150deg,#fce7f3,#f9a8d4);border-radius:4px 4px 14px 14px;box-shadow:0 8px 26px rgba(0,0,0,.5);}
.env-body::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom-left,transparent 50%,rgba(219,39,119,.1) 50%),linear-gradient(to bottom-right,transparent 50%,rgba(219,39,119,.1) 50%);border-radius:4px 4px 14px 14px;}
.env-flap{position:absolute;top:0;left:0;width:310px;height:155px;background:linear-gradient(180deg,#f9a8d4,#fce7f3);clip-path:polygon(0 0,50% 63%,100% 0);transform-origin:top center;transition:transform .8s cubic-bezier(.4,0,.2,1);z-index:4;}
.env-wrap.open .env-flap{transform:rotateX(-180deg);}
.env-seal{position:absolute;top:52px;left:50%;transform:translateX(-50%);font-size:32px;z-index:5;transition:opacity .25s ease .2s;}
.env-wrap.open .env-seal{opacity:0;}
.env-hint{font-family:'Cairo',sans-serif;font-size:11px;letter-spacing:3px;color:rgba(244,114,182,.6);text-transform:uppercase;animation:pulse 2s ease infinite;}
@keyframes pulse{0%,100%{opacity:.5;}50%{opacity:1;}}

/* ═══ LETTER POPUP ═══ */
#letter-popup{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  z-index:300;pointer-events:none;opacity:0;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(4px);
  transition:opacity .7s ease;
}
#letter-popup.show{opacity:1;pointer-events:all;}
.letter-paper{
  background:#fffbf0;
  border-radius:12px;
  padding:36px 30px 28px;
  max-width:330px;width:88%;
  box-shadow:0 24px 60px rgba(0,0,0,.7),0 0 0 1px rgba(201,168,76,.3);
  text-align:center;position:relative;
  animation:letterRise .65s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes letterRise{from{transform:translateY(50px) scale(.85);opacity:0;}to{transform:none;opacity:1;}}
.lp-deco{font-size:26px;letter-spacing:8px;margin-bottom:14px;}
.lp-name{font-family:'Scheherazade New',serif;font-size:30px;font-weight:700;color:#be185d;margin-bottom:10px;}
.lp-body{
  font-family:'Scheherazade New',serif;
  font-size:18px;color:#5a1a30;
  line-height:2.1;margin-bottom:14px;
  direction:rtl;
}
.lp-body em{color:#be185d;font-style:normal;font-weight:700;}
.lp-bottom{font-size:22px;letter-spacing:8px;margin-bottom:12px;}
.lp-sig{font-family:'Cairo',sans-serif;font-size:9px;letter-spacing:3px;color:#c9a84c;text-transform:uppercase;border-top:1px solid rgba(201,168,76,.25);padding-top:10px;}
.close-btn{
  margin-top:14px;padding:8px 22px;
  background:transparent;border:1px solid var(--pink);
  color:var(--pink);font-family:'Cairo',sans-serif;
  font-size:11px;letter-spacing:2px;border-radius:30px;cursor:pointer;transition:all .3s;
}
.close-btn:hover{background:var(--pink);color:#fff;}

/* FX */
.burst{position:fixed;inset:0;pointer-events:none;z-index:500;}
.bp{position:absolute;border-radius:3px;animation:bpFly 1.4s ease both;}
@keyframes bpFly{0%{transform:translate(0,0) rotate(0deg);opacity:1;}100%{transform:translate(var(--tx),var(--ty)) rotate(720deg);opacity:0;}}
.fw{position:fixed;pointer-events:none;z-index:400;}
.fws{position:absolute;width:4px;height:4px;border-radius:50%;animation:fwFly 1s ease both;}
@keyframes fwFly{0%{transform:translate(0,0);opacity:1;}100%{transform:translate(var(--fx),var(--fy));opacity:0;}}

/* music btn */
#mbtn{
  position:fixed;bottom:18px;left:18px;
  padding:9px 20px;background:rgba(20,6,16,.92);
  border:1.5px solid var(--pink);color:var(--pink);
  font-family:'Cairo',sans-serif;font-size:11px;
  border-radius:30px;cursor:pointer;z-index:1000;
  backdrop-filter:blur(8px);transition:all .3s;
}

#mbtn:hover{background:var(--pink);color:#fff;}
</style>
</head>

    <div class="cnt-msg" id="cnt">اتمنى امنية قبل ما تطفي الشموع🕯️</div>
    <button class="blow-btn" id="blowBtn" onclick="blowAll()"> طفي الكل دفعة واحدة 🌬️</button>
    <button class="ltr-btn" id="ltrBtn" onclick="goEnv()">رساله خاصة! 💌</button>
  </div>

<!-- ═══ SCREEN 3: ENVELOPE ═══  -->
<div id="s3-env">
  <div class="env-ttl">🌸 رسالة من القلب 🌸</div>
  <div class="env-wrap" id="envW" onclick="openEnv()">
    <div class="env-body"></div>
    <div class="env-flap"></div>
    <div class="env-seal">💗</div>
  </div>
  <div class="env-hint" id="envHint">اضغط على الظرف 💌</div>
</div>

<!-- ═══ LETTER POPUP ═══ -->
<div id="letter-popup">
  <div class="letter-paper">
    <div class="lp-deco">🌸 💛 🌸</div>
    <div class="lp-name">عزيزي غزوان </div>
    <div class="lp-body">
     بتمنالك سنة سعيدة <br>
     وحلوة متل قلبك الأبيض<br>
 وروحك المشرقة دائما <br>
      متل الشمس 🌞<br>
      <em>كل عام وأنت بألف خير!</em>
    </div>
    <div class="lp-bottom">💗 ✨ 💗</div>
    
    <button class="close-btn" onclick="closeLetter()">✕ إغلاق</button>
  </div>
</div>

<button id="mbtn" onclick="toggleMusic()">⏸ إيقاف الموسيقى</button>

<script>
// CURSOR
const cur=document.getElementById('cursor');
document.addEventListener('mousemove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';});

// STARS
const bgS=document.getElementById('bgStars');
['#f472b6','#fde68a','#fff','#fbcfe8'].forEach(c=>{
  for(let i=0;i<20;i++){
    const s=document.createElement('div');s.className='bg-star';
    const sz=Math.random()*2.5+.6;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${c};animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*5}s;`;
    bgS.appendChild(s);
  }
});

// HEARTS
const heartsEl=document.getElementById('hearts');
['🌸','💛','🎂','✨','💗'].forEach(e=>{
  for(let i=0;i<3;i++){
    const h=document.createElement('div');h.className='heart';h.textContent=e;
    h.style.cssText=`left:${Math.random()*100}%;font-size:${13+Math.random()*13}px;animation-duration:${7+Math.random()*8}s;animation-delay:${Math.random()*8}s;`;
    heartsEl.appendChild(h);
  }
});

// ═══ AUDIO ═══
const audio = document.getElementById('audio');
let musicOn = false;

function startMusic(){
  if(musicOn) return;
   audio.currentTime = 18.7;
  audio.play().then(()=>{
    musicOn=true;
    document.getElementById('mbtn').textContent='⏸ إيقاف الموسيقى';
  }).catch(()=>{});
}
function stopMusic(){
  audio.pause();audio.currentTime=0;
  musicOn=false;
  document.getElementById('mbtn').textContent='▶ تشغيل الموسيقى';
}
function toggleMusic(){
  if(musicOn) stopMusic(); else startMusic();
}
// ═══ PAGE NAVIGATION ═══
function goToCakePage() {
  document.getElementById('s1').classList.add('hide');
  setTimeout(() => {
    document.getElementById('s2-cake').classList.add('show');
    startMusic();
  }, 700);
}
// ═══ ENVELOPE PAGE ═══
function goEnv() {
  document.getElementById('s2-cake').classList.remove('show');
  setTimeout(() => {
    document.getElementById('s3-env').classList.add('show');
  }, 700);
}
// ═══ NEUE FUNKTION: Kuchen anzeigen ═══
function showCake() {
  document.getElementById('celebrateBtn').style.display = 'none';
  document.getElementById('cakeContent').style.display = 'block';
  startMusic(); // Musik starten wenn Kuchen erscheint
}
// ═══ CANDLES ═══
let blown=0;
const msgs=['🕯️يلا نطفي الشموع','هابي بيرثدي طيور 😁','هابي بيرثدي يا أمور 😍','هابي بيرثدي لف ودور 💃','هابي بيرثدي اوعى اتدوخ 🙂‍↔️','هابي بيرثدي غمض العيون 👀',' هابي بيرثدي يا عمري 😘❤️'];

function blowOne(c,n){
  if(c.classList.contains('blown')) return;
  if(blown===0) startMusic();
  c.classList.add('blown');blown++;
  spawnFw(c.getBoundingClientRect().left+6,c.getBoundingClientRect().top+10);
  document.getElementById('cnt').textContent=msgs[blown];
  if(blown===6) setTimeout(celebrate,400);
}
function blowAll(){
  const rem=document.querySelectorAll('.candle:not(.blown)');
  if(rem.length===0) return;
  if(blown===0) startMusic();
  rem.forEach((c,i)=>{
    setTimeout(()=>{
      if(c.classList.contains('blown')) return;
      c.classList.add('blown');blown++;
      spawnFw(c.getBoundingClientRect().left+6,c.getBoundingClientRect().top+10);
      document.getElementById('cnt').textContent=msgs[Math.min(blown,6)];
      if(blown===6) setTimeout(celebrate,400);
    },i*350);
  });
}
function celebrate(){
  document.getElementById('blowBtn').style.display='none';
  launchBurst();
  for(let i=0;i<12;i++) setTimeout(()=>spawnFw(Math.random()*innerWidth,Math.random()*innerHeight*.8),i*200);
  setTimeout(()=>document.getElementById('ltrBtn').style.display='block',2200);
}


let envDone=false;
function openEnv(){
  if(envDone) return; envDone=true;
  document.getElementById('envW').classList.add('open');
  document.getElementById('envHint').style.opacity='0';
  setTimeout(()=>{
    document.getElementById('letter-popup').classList.add('show');
    for(let i=0;i<7;i++) setTimeout(()=>spawnFw(Math.random()*innerWidth,Math.random()*innerHeight*.7),i*180);
  },900);
}
function closeLetter(){
  document.getElementById('letter-popup').classList.remove('show');
}

// ═══ FX ═══
function launchBurst(){
  const burst=document.getElementById('burst');burst.innerHTML='';
  const cols=['#f472b6','#fde68a','#fff','#fbcfe8','#fbbf24','#db2777','#a855f7'];
  const cx=innerWidth/2,cy=innerHeight/2;
  for(let i=0;i<130;i++){
    const p=document.createElement('div');p.className='bp';
    const a=Math.random()*Math.PI*2,d=80+Math.random()*340;
    p.style.cssText=`left:${cx}px;top:${cy}px;width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;background:${cols[~~(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;animation-delay:${Math.random()*.3}s;`;
    burst.appendChild(p);
  }
  setTimeout(()=>burst.innerHTML='',2000);
}
function spawnFw(x,y){
  const fw=document.createElement('div');fw.className='fw';
  fw.style.cssText=`left:${x}px;top:${y}px;`;
  const cols=['#f472b6','#fde68a','#fff','#fbcfe8','#fbbf24'];
  for(let i=0;i<20;i++){
    const s=document.createElement('div');s.className='fws';
    const a=(i/20)*Math.PI*2,d=25+Math.random()*55;
    s.style.cssText=`background:${cols[~~(Math.random()*cols.length)]};--fx:${Math.cos(a)*d}px;--fy:${Math.sin(a)*d}px;animation-delay:${Math.random()*.1}s;`;
    fw.appendChild(s);
  }
  document.body.appendChild(fw);
  setTimeout(()=>fw.remove(),1100);
}
</script>
<script>
const birthdayDate = new Date("2026-03-06T00:00:00"); // ✨ عدلي التاريخ هنا

function updateCountdown() {
  const now = new Date();
  const diff = birthdayDate - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerHTML = " بمناسبه عيد ميلادو 🎂";
     // NEU: Button anzeigen wenn Countdown fertig
    document.getElementById("celebrateBtn").style.display = "block";
    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  document.getElementById("countdown").innerHTML =
    "✨"+`باقي ${days} يوم ${hours} ساعة ${minutes} دقيقة ${seconds} ثانية!`+"✨";
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>
